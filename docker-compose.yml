services:
  ollama:
    image: ollama/ollama
    volumes:
      - ollama:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 5s
      retries: 30

  model-puller:
    image: ollama/ollama
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: ["ollama", "pull", "${OLLAMA_MODEL:-llama3.2}"]
    restart: "no"

  app:
    build: .
    depends_on:
      model-puller:
        condition: service_completed_successfully
    environment:
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2}
      - OUTPUT_BASENAME=data/papers
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data

volumes:
  ollama:
